<!DOCTYPE html>
<html>
<head>
    <title>To Do App Dashboard</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #0f172a;
            color: white;

            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        /* MAIN WRAPPER (SIDEBAR + CONTENT) */
        .container {
            display: flex;
            flex: 1;
        }

        /* SIDEBAR */
        aside {
            width: 250px;
            background: #111827;
            padding: 20px;
            text-align: center;
            box-shadow: 2px 0 10px rgba(0,0,0,0.5);
        }

        aside img {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid #22c55e;
            margin-bottom: 10px;
        }

        /* MAIN */
        .main {
            flex: 1;
            padding: 20px;
        }

        h2 {
            margin-top: 0;
        }

        input, textarea {
            padding: 10px;
            width: 250px;
            margin: 5px 0;
            border-radius: 6px;
            border: none;
            outline: none;
        }

        button {
            padding: 10px;
            margin: 5px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
        }

        .add { background: #22c55e; color: white; }
        .del { background: #ef4444; color: white; }
        .show { background: #3b82f6; color: white; }

        table {
            margin-top: 15px;
            width: 100%;
            border-collapse: collapse;
            display: none;
            background: white;
            color: black;
            border-radius: 8px;
            overflow: hidden;
        }

        th {
            background: #3b82f6;
            color: white;
            padding: 10px;
        }

        td {
            padding: 10px;
            border-bottom: 1px solid #ddd;
        }

        /* COMMENTS */
        .comments {
            margin-top: 30px;
        }

        .comment-box {
            background: #1f2937;
            padding: 10px;
            margin-top: 10px;
            border-radius: 8px;
        }

        /* FOOTER */
        .footer {
            background: #111827;
            text-align: center;
            padding: 20px;
            border-top: 2px solid #22c55e;
        }

        .footer a {
            color: #3b82f6;
            text-decoration: none;
        }

        .footer a:hover {
            text-decoration: underline;
        }

    </style>
</head>

<body>

<div class="container">

    <!-- SIDEBAR -->
    <aside>
        <img src="Prroject.jpg" alt="Profile">
        <h3>Rood Wendy Robert</h3>
        <p>Admin Dashboard</p>
    </aside>

    <!-- MAIN CONTENT -->
    <div class="main">

        <h2>🔥 To Do Dashboard</h2>

        <input id="add" type="text" placeholder="Add task">
        <button class="add" onclick="addTask()">Add</button>

        <br>

        <input id="delete" type="text" placeholder="Delete task">
        <button class="del" onclick="deleteTask()">Delete</button>

        <br>

        <button class="show" onclick="displayTask()">Display</button>

        <p id="check"></p>

        <table id="taskTable">
            <thead>
                <tr>
                    <th>#</th>
                    <th>Task</th>
                </tr>
            </thead>
            <tbody id="output"></tbody>
        </table>

        <!-- COMMENTS -->
        <div class="comments">

            <h3>💬 Comments</h3>

            <textarea id="commentInput" placeholder="Write comment..."></textarea>
            <br>
            <button onclick="addComment()">Post</button>

            <div id="commentList"></div>

        </div>

    </div>

</div>

<!-- FOOTER -->
<footer class="footer">
    <p>📞 Contact Me: +1 (347) 289-1676</p>

    <p>
        🔗 Instagram:
        <a href="https://www.instagram.com/rood_wendy?igsh=MXc4d2JvbDFjOHpqMw%3D%3D&utm_source=qr" target="_blank">Rood</a>
        |
        📘 Facebook:
        <a href="https://www.facebook.com/share/15mnStRKDwj/?mibextid=wwXIfr" target="_blank">Rood Wendy</a>
    </p>

    <p>© 2026 Rood Wendy Robert | All Rights Reserved</p>
</footer>

<script>

    let Task = [];
    let comments = [];

    function addTask() {
        let value = document.getElementById("add").value;
        Task.push(value);
    }

    function deleteTask() {
        let value = document.getElementById("delete").value.trim();

        if (Task.includes(value)) {
            Task = Task.filter(item => item !== value);
            document.getElementById("check").innerText = "Task Deleted Successfully!";
        } else {
            document.getElementById("check").innerText = "Not Found";
        }
    }

    function displayTask() {
        let table = "";

        for (let i = 0; i < Task.length; i++) {
            table += `
                <tr>
                    <td>${i + 1}</td>
                    <td>${Task[i]}</td>
                </tr>
            `;
        }

        document.getElementById("output").innerHTML = table;
        document.getElementById("taskTable").style.display = "table";
    }

    function addComment() {
        let text = document.getElementById("commentInput").value;

        comments.push(text);

        renderComments();
    }

    function renderComments() {
        let html = "";

        for (let i = 0; i < comments.length; i++) {
            html += `<div class="comment-box">${comments[i]}</div>`;
        }

        document.getElementById("commentList").innerHTML = html;
    }

</script>

</body>
</html>
